name: graph-flows
version: 0.1.0
type: tool
runtime: docker
entrypoint: python src/main.py /input.json
description: lista, consulta, ejecuta y gestiona flujos de Power Automate via la API de Power Platform
input_schema:
  type: object
  properties:
    action:
      type: string
    profile:
      type: string
    flowId:
      type: string
    environment:
      type: string
    triggerBody:
      type: object
    top:
      type: integer
    user:
      type: string
    tenantIdOverride:
      type: string
    clientIdOverride:
      type: string
output_schema:
  type: object
  properties:
    success:
      type: boolean
    message:
      type: string
    data:
      type: object
    artifactPath:
      type: string
    errorType:
      type: string
