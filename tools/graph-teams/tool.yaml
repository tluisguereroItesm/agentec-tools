name: graph-teams
version: 0.1.0
type: tool
runtime: docker
entrypoint: python src/main.py /input.json
description: accede a equipos, canales y mensajes de Microsoft Teams via Microsoft Graph
input_schema:
  type: object
  properties:
    action:
      type: string
    profile:
      type: string
    teamId:
      type: string
    channelId:
      type: string
    body:
      type: string
    top:
      type: integer
    user:
      type: string
    tenantIdOverride:
      type: string
    clientIdOverride:
      type: string
output_schema:
  type: object
  properties:
    success:
      type: boolean
    message:
      type: string
    data:
      type: object
    artifactPath:
      type: string
    errorType:
      type: string
