name: graph-calendar
version: 0.1.0
type: tool
runtime: docker
entrypoint: python src/main.py /input.json
description: consulta y gestiona el calendario de Microsoft 365 — ver eventos, crear reuniones, revisar disponibilidad
input_schema:
  type: object
  properties:
    action:
      type: string
    profile:
      type: string
    id:
      type: string
    subject:
      type: string
    start:
      type: string
    end:
      type: string
    timezone:
      type: string
    body:
      type: string
    location:
      type: string
    attendees:
      type: array
      items:
        type: string
    isOnline:
      type: boolean
    days:
      type: integer
    top:
      type: integer
    user:
      type: string
    graphUserId:
      type: string
    tenantIdOverride:
      type: string
    clientIdOverride:
      type: string
output_schema:
  type: object
  properties:
    success:
      type: boolean
    message:
      type: string
    data:
      type: object
    artifactPath:
      type: string
    errorType:
      type: string
