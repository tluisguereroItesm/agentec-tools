name: graph-files-write
version: 0.1.0
type: tool
runtime: docker
entrypoint: python src/main.py /input.json
description: crea, sube, mueve, renombra, copia, elimina y comparte archivos en OneDrive y SharePoint via Microsoft Graph
input_schema:
  type: object
  properties:
    action:
      type: string
    profile:
      type: string
    id:
      type: string
    localPath:
      type: string
    remotePath:
      type: string
    name:
      type: string
    parent:
      type: string
    destinationId:
      type: string
    linkType:
      type: string
    scope:
      type: string
    user:
      type: string
    graphUserId:
      type: string
    tenantIdOverride:
      type: string
    clientIdOverride:
      type: string
output_schema:
  type: object
  properties:
    success:
      type: boolean
    message:
      type: string
    data:
      type: object
    artifactPath:
      type: string
    errorType:
      type: string
