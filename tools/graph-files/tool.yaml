name: graph-files
version: 0.1.0
type: tool
runtime: docker
entrypoint: python src/main.py /input.json
description: consulta, lee y resume archivos OneDrive o SharePoint vía Microsoft Graph usando perfiles reutilizables
input_schema:
  type: object
  required:
    - action
  properties:
    action:
      type: string
    profile:
      type: string
    configFile:
      type: string
    user:
      type: string
    graphUserId:
      type: string
    top:
      type: integer
    query:
      type: string
    id:
      type: string
    maxChars:
      type: integer
    driveMode:
      type: string
    siteHostname:
      type: string
    sitePath:
      type: string
    tenantIdOverride:
      type: string
    clientIdOverride:
      type: string
output_schema:
  type: object
  properties:
    success:
      type: boolean
    message:
      type: string
    data:
      type: object
    profile:
      type: string
    tenantId:
      type: string
    backend:
      type: string
    artifactPath:
      type: string
    errorType:
      type: string
